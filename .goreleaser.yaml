version: 2

project_name: trivy_operator
release:
  draft: false
  prerelease: auto
env:
  - GO111MODULE=on
  - CGO_ENABLED=0
  - GOEXPERIMENT=jsonv2
before:
  hooks:
    - go mod download
builds:
  - id: trivy-operator
    main: ./cmd/trivy-operator/main.go
    binary: trivy-operator
    goos:
      - linux
    goarch:
      - amd64
      - arm
      - arm64
      - s390x
      - ppc64le
    goarm:
      - "7"
archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm" }}ARM
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else }}{{ .Arch }}{{ end }}
    builds:
      - trivy-operator
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ .FullCommit }}"
changelog:
  filters:
    exclude:
      - '^test'
      - '^release'
  sort: asc
  use: github
  groups:
    - title: ✨ Notable Changes ✨
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: 🐛 Notable Fixes 🐛
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 150
    - title: 👮 Security updates👮
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: 📝 Documentation 📝
      regexp: ^.*?docs(\([[:word:]]+\))??!?:.+$
      order: 250
    - title: 🔧 Miscellaneous 🔧
      regexp: '^.*?chore(\([[:word:]]+\))??!?:.+$'
      order: 300
    - title: 👷 Other work 👷
      order: 9999
dockers:
  - image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    dockerfile: build/trivy-operator/Dockerfile
    goarch: amd64
    ids:
      - trivy-operator
    build_flag_templates:
      - "--label=org.opencontainers.image.title=trivy-operator"
      - "--label=org.opencontainers.image.description=Keeps trivy-operator resources updated"
      - "--label=org.opencontainers.image.vendor=Aqua Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/etore/trivy-operator"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--platform=linux/amd64"

  - image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9-amd64"
    use: buildx
    goos: linux
    dockerfile: build/trivy-operator/Dockerfile.ubi9
    goarch: amd64
    extra_files:
      - LICENSE
    ids:
      - trivy-operator
    build_flag_templates:
      - "--label=org.opencontainers.image.title=trivy-operator"
      - "--label=org.opencontainers.image.description=Keeps trivy-operator resources updated"
      - "--label=org.opencontainers.image.vendor=Aqua Security"
      - "--label=org.opencontainers.image.version={{ .Version }}"
