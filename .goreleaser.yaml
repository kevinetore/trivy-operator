docker_manifests:
  - name_template: "{{ .Env.IMAGE_REPO }}:{{ .Version }}"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-amd64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-arm64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-s390x"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ppc64le"

  - name_template: "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9-amd64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9-arm64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9-s390x"
      - "{{ .Env.IMAGE_REPO }}:{{ .Version }}-ubi9-ppc64le"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all
    output: true

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "--oidc-issuer=https://token.actions.githubusercontent.com"
      - "${artifact}"
    artifacts: all
    output: true
